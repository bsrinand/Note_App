<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Inkwell</title>
<link rel="stylesheet" href="/style.css" />
<script>
  // apply saved theme + panel/toolbar visibility before paint (no flash)
  var d = document.documentElement;
  d.dataset.theme = localStorage.getItem('inkwell-theme') || 'light';
  if (localStorage.getItem('inkwell-panels') === 'off') d.classList.add('hide-panels');
  if (localStorage.getItem('inkwell-toolbar') === 'off') d.classList.add('hide-toolbar');
</script>
</head>
<body>
<div id="app">
  <!-- Top bar -->
  <header id="topbar">
    <div class="top-left">
      <button id="panelsToggle" class="top-btn" title="Show / hide side panels">
        <svg viewBox="0 0 20 20" width="17" height="17"><rect x="2.5" y="3.5" width="15" height="13" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.6"/><line x1="7.8" y1="3.5" x2="7.8" y2="16.5" stroke="currentColor" stroke-width="1.6"/></svg>
      </button>
      <div class="brand">
        <svg class="logo-mark" viewBox="0 0 32 32" width="26" height="26" aria-hidden="true">
          <rect x="1" y="1" width="30" height="30" rx="8.5" fill="var(--accent)"/>
          <path d="M16 6 L21.5 18.5 C21.5 23.5 18.8 25.5 16 25.5 C13.2 25.5 10.5 23.5 10.5 18.5 Z" fill="#fff"/>
          <line x1="16" y1="12.5" x2="16" y2="23.5" stroke="var(--accent)" stroke-width="1.5"/>
          <circle cx="16" cy="11.5" r="1.7" fill="var(--accent)"/>
        </svg>
        <span>Inkwell</span>
      </div>
    </div>
    <div class="top-right">
      <button id="toolbarToggle" class="top-btn" title="Show / hide toolbar">
        <svg viewBox="0 0 20 20" width="17" height="17"><g stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"><line x1="3" y1="6.5" x2="17" y2="6.5"/><circle cx="13" cy="6.5" r="1.9" fill="var(--panel)"/><line x1="3" y1="13.5" x2="17" y2="13.5"/><circle cx="7" cy="13.5" r="1.9" fill="var(--panel)"/></g></svg>
      </button>
      <button id="themeToggle" class="top-btn" title="Toggle dark mode">🌙</button>
      <button id="settingsBtn" class="top-btn" title="Settings">⚙️</button>
      <button id="userChip" class="user-chip" title="Account settings"><span id="userInitial">?</span><span id="userName">…</span></button>
    </div>
  </header>

  <div id="workspace">
    <!-- Projects -->
    <aside id="sidebar">
      <div class="col-head">
        <span class="col-title">Folders</span>
        <button id="newProjectBtn" class="icon-btn" title="New project folder">＋</button>
      </div>
      <div id="projectList" class="list"></div>
    </aside>

    <!-- Notes -->
    <section id="notesCol">
      <div class="col-head">
        <span id="projectName" class="col-title">Select a folder</span>
        <button id="newNoteBtn" class="icon-btn" title="New note" disabled>＋</button>
      </div>
      <div id="noteList" class="list"></div>
    </section>

    <!-- Editor -->
    <main id="editor">
      <div id="emptyState" class="empty">
        <div>
          <h2>Welcome to Inkwell 👋</h2>
          <p>Create a folder on the left, then add a note to start writing.</p>
        </div>
      </div>

      <div id="editorInner" class="hidden">
        <div class="toolbar">
          <input id="noteTitle" class="title-input" placeholder="Untitled" />
          <div class="tools">
            <div class="seg" id="pageTypeSeg">
              <button data-pt="blank">Blank</button>
              <button data-pt="ruled">Ruled</button>
              <button data-pt="grid">Grid</button>
            </div>
            <span class="divider"></span>
            <button id="penBtn" class="tool" title="Pen — write with a stylus or mouse">✒️ Pen</button>
            <button id="eraserBtn" class="tool" title="Eraser">🩹 Erase</button>
            <input id="penColor" type="color" value="#2b5cff" title="Ink color" />
            <select id="penSize" class="tsel" title="Pen size">
              <option value="1.5">Fine</option>
              <option value="2.5" selected>Medium</option>
              <option value="4">Bold</option>
            </select>
            <button id="undoBtn" class="tool" title="Undo last stroke">↶ Undo</button>
            <span class="divider"></span>
            <button id="imageBtn" class="tool" title="Insert image">🖼️ Image</button>
            <span id="saveStatus" class="save-status">Saved</span>
          </div>
        </div>

        <!-- Word-style text formatting ribbon -->
        <div class="ribbon" id="ribbon">
          <button class="rb" id="tUndo" title="Undo (Ctrl+Z)">↶</button>
          <button class="rb" id="tRedo" title="Redo (Ctrl+Y)">↷</button>
          <span class="divider"></span>

          <select id="blockStyle" class="tsel" title="Paragraph style">
            <option value="P">Normal</option>
            <option value="H1">Heading 1</option>
            <option value="H2">Heading 2</option>
            <option value="H3">Heading 3</option>
            <option value="BLOCKQUOTE">Quote</option>
            <option value="PRE">Code block</option>
          </select>
          <select id="fontFamily" class="tsel" title="Font">
            <option value="">Default</option>
            <option value="Georgia, 'Times New Roman', serif">Serif</option>
            <option value="Consolas, 'Courier New', monospace">Monospace</option>
            <option value="Arial, Helvetica, sans-serif">Arial</option>
            <option value="'Segoe UI', system-ui, sans-serif">Segoe UI</option>
            <option value="Georgia, serif">Georgia</option>
            <option value="'Times New Roman', serif">Times New Roman</option>
            <option value="Verdana, sans-serif">Verdana</option>
            <option value="'Trebuchet MS', sans-serif">Trebuchet</option>
            <option value="'Comic Sans MS', cursive">Comic Sans</option>
          </select>
          <select id="fontSize" class="tsel" title="Font size">
            <option value="12">12</option><option value="14">14</option>
            <option value="16" selected>16</option><option value="18">18</option>
            <option value="20">20</option><option value="24">24</option>
            <option value="28">28</option><option value="32">32</option>
            <option value="40">40</option><option value="48">48</option>
          </select>
          <span class="divider"></span>

          <div class="seg" id="styleSeg">
            <button id="boldBtn" data-cmd="bold" title="Bold (Ctrl+B)" style="font-weight:800">B</button>
            <button id="italicBtn" data-cmd="italic" title="Italic (Ctrl+I)" style="font-style:italic">I</button>
            <button id="underlineBtn" data-cmd="underline" title="Underline (Ctrl+U)" style="text-decoration:underline">U</button>
            <button id="strikeBtn" data-cmd="strikeThrough" title="Strikethrough" style="text-decoration:line-through">S</button>
          </div>
          <button class="rb" id="supBtn" title="Superscript">x²</button>
          <button class="rb" id="subBtn" title="Subscript">x₂</button>
          <input id="textColor" class="cswatch" type="color" value="#1f2430" title="Text color" />
          <input id="hiliteColor" class="cswatch" type="color" value="#ffe600" title="Highlight color" />
          <span class="divider"></span>

          <div class="seg" id="alignSeg">
            <button data-align="justifyLeft" title="Align left"><svg viewBox="0 0 16 16"><g><line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="10" y2="8"/><line x1="2" y1="12" x2="13" y2="12"/></g></svg></button>
            <button data-align="justifyCenter" title="Center"><svg viewBox="0 0 16 16"><g><line x1="2" y1="4" x2="14" y2="4"/><line x1="4" y1="8" x2="12" y2="8"/><line x1="3" y1="12" x2="13" y2="12"/></g></svg></button>
            <button data-align="justifyRight" title="Align right"><svg viewBox="0 0 16 16"><g><line x1="2" y1="4" x2="14" y2="4"/><line x1="6" y1="8" x2="14" y2="8"/><line x1="3" y1="12" x2="14" y2="12"/></g></svg></button>
            <button data-align="justifyFull" title="Justify"><svg viewBox="0 0 16 16"><g><line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/></g></svg></button>
          </div>
          <span class="divider"></span>

          <button class="rb" id="ulBtn" title="Bulleted list">•&nbsp;≣</button>
          <button class="rb" id="olBtn" title="Numbered list">1.&nbsp;≣</button>
          <button class="rb" id="outdentBtn" title="Decrease indent">⇤</button>
          <button class="rb" id="indentBtn" title="Increase indent">⇥</button>
          <select id="lineSpacing" class="tsel" title="Line spacing">
            <option value="">↕ Spacing</option>
            <option value="1">1.0</option>
            <option value="1.15">1.15</option>
            <option value="1.5">1.5</option>
            <option value="2">2.0</option>
            <option value="2.5">2.5</option>
            <option value="3">3.0</option>
          </select>
          <span class="divider"></span>

          <button class="rb" id="linkBtn" title="Insert link">🔗</button>
          <button class="rb" id="hrBtn" title="Horizontal line">―</button>
          <button class="rb" id="clearBtn" title="Clear formatting">✕</button>
        </div>

        <div id="pageScroll">
          <div id="page">
            <div id="textLayer" class="text-layer" contenteditable="true" spellcheck="true"></div>
            <canvas id="inkLayer"></canvas>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Settings modal -->
<div id="settingsOverlay" class="overlay hidden">
  <div class="modal">
    <div class="modal-head">
      <h3>Settings</h3>
      <button id="closeSettings" class="top-btn" title="Close">✕</button>
    </div>

    <div class="modal-section">
      <label class="fld"><span>Display name</span>
        <input id="setName" type="text" placeholder="Your name" />
      </label>
      <div class="fld"><span>Email</span><div id="setEmail" class="readonly-val"></div></div>
      <button id="saveName" class="btn-primary sm">Save name</button>
      <span id="nameSaved" class="mini-note"></span>
    </div>

    <div class="modal-section">
      <div class="section-label">Appearance</div>
      <label class="switch-row">
        <span>Dark mode</span>
        <input id="darkSwitch" type="checkbox" />
      </label>
    </div>

    <details class="modal-section">
      <summary class="section-label">Change password</summary>
      <label class="fld"><span>Current password</span><input id="curPw" type="password" autocomplete="current-password" /></label>
      <label class="fld"><span>New password</span><input id="newPw" type="password" autocomplete="new-password" placeholder="At least 6 characters" /></label>
      <button id="savePw" class="btn-primary sm">Update password</button>
      <span id="pwNote" class="mini-note"></span>
    </details>

    <div class="modal-foot">
      <button id="logoutBtn" class="btn-danger">Log out</button>
    </div>
  </div>
</div>

<input id="fileInput" type="file" accept="image/*" hidden />
<script src="/app.js"></script>
</body>
</html>
